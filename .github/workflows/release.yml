name: Release

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

jobs:
  ci:
    name: Run CI
    # NOTE: The IDE may report an error below ("Unable to find reusable workflow").
    # This is a false positive; local resolution fails but GitHub Actions handles it correctly.
    uses: ./.github/workflows/ci.yml

  publish:
    name: Publish to Open VSX
    needs: ci
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'npm'
          cache-dependency-path: 'vscode-extension/package-lock.json'
      
      - name: Extract Version
        id: extract_version
        run: |
          VERSION=$(node -p "require('./vscode-extension/package.json').version")
          echo "version=v$VERSION" >> $GITHUB_OUTPUT
        
      - name: Create and Push Tag (Manual Run)
        if: github.event_name == 'workflow_dispatch'
        run: |
          TAG=${{ steps.extract_version.outputs.version }}
          if ! git rev-parse "$TAG" >/dev/null 2>&1; then
            echo "Tag $TAG does not exist. Creating..."
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git tag "$TAG"
            git push origin "$TAG"
          else
            echo "Tag $TAG already exists."
          fi

      - name: Install Dependencies
        run: npm ci
        working-directory: vscode-extension
      
      - name: Package Extension
        run: npx @vscode/vsce package
        working-directory: vscode-extension

      - name: Publish to Open VSX
        uses: HaaLeo/publish-vscode-extension@v2
        id: publish
        with:
          pat: ${{ secrets.OVSX_PAT }}
          packagePath: ./vscode-extension
          skipDuplicate: true

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.extract_version.outputs.version }}
          files: |
            vscode-extension/*.vsix
          generate_release_notes: true
          prerelease: ${{ contains(steps.extract_version.outputs.version, 'beta') || contains(steps.extract_version.outputs.version, 'alpha') }}
