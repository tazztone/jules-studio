name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  ci:
    name: Run CI
    # NOTE: The IDE may report an error below ("Unable to find reusable workflow").
    # This is a false positive; local resolution fails but GitHub Actions handles it correctly.
    uses: ./.github/workflows/ci.yml

  publish:
    name: Publish to Open VSX
    needs: ci
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: 'vscode-extension/package-lock.json'
      
      - name: Install Dependencies
        run: npm ci
        working-directory: vscode-extension
      
      - name: Publish to Open VSX
        uses: HaaLeo/publish-vscode-extension@v2
        id: publish
        with:
          pat: ${{ secrets.OVSX_PAT }}
          packagePath: ./vscode-extension
          skipDuplicate: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ steps.publish.outputs.vsixPath }}
          generate_release_notes: true
          prerelease: ${{ contains(github.ref_name, 'beta') || contains(github.ref_name, 'alpha') }}
